<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Futuristic Cyan to Purple Gradient (Vertical for Icon) -->
    <linearGradient id="cyanToPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#BF00FF" />
    </linearGradient>

    <!-- Horizontal Gradient for Text -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#BF00FF" />
    </linearGradient>

    <!-- Core Gradient -->
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#7A26C1" />
    </linearGradient>

    <!-- Subtle Glow Filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Stronger Glow for Nodes -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND (Transparent) -->
  <rect width="1200" height="300" fill="transparent" />

  <!-- ICON SECTION (Left) -->
  <g transform="translate(150, 150) scale(0.55) translate(-256, -256)">
    <!-- Orbitals -->
    <g filter="url(#softGlow)">
      <path d="M256 80 C352.8 80 432 159.2 432 256 C432 290 422 322 405 348" 
            stroke="url(#cyanToPurple)" stroke-width="28" stroke-linecap="round" />
      <path d="M370 410 C338 430 300 442 256 442 C159.2 442 80 362.8 80 256 C80 230 85 205 96 182" 
            stroke="url(#cyanToPurple)" stroke-width="28" stroke-linecap="round" />
      <path d="M142 102 C174 88 214 80 256 80" 
            stroke="url(#cyanToPurple)" stroke-width="28" stroke-linecap="round" />
    </g>

    <!-- Central Hexagonal Core -->
    <path d="M256 180 L322 218 V294 L256 332 L190 294 V218 Z" fill="url(#coreGradient)" filter="url(#softGlow)">
      <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="20s" repeatCount="indefinite" />
    </path>

    <!-- Connective Nodes -->
    <circle cx="256" cy="80" r="12" fill="white" filter="url(#nodeGlow)" />
    <circle cx="405" cy="348" r="12" fill="white" filter="url(#nodeGlow)" />
    <circle cx="96" cy="182" r="12" fill="white" filter="url(#nodeGlow)" />

    <!-- Inner Connectivity -->
    <line x1="256" y1="180" x2="256" y2="80" stroke="#00F5FF" stroke-width="2" stroke-dasharray="6 6" opacity="0.5" />
    <line x1="322" y1="294" x2="405" y2="348" stroke="#BF00FF" stroke-width="2" stroke-dasharray="6 6" opacity="0.5" />
    <line x1="190" y1="218" x2="96" y2="182" stroke="#00F5FF" stroke-width="2" stroke-dasharray="6 6" opacity="0.5" />
  </g>

  <!-- TEXT SECTION (Right) -->
  <text x="320" y="178" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="105" letter-spacing="4" filter="url(#softGlow)">
    <tspan fill="url(#textGradient)">OpenCentravity</tspan>
  </text>
  
  <!-- Subtle Decorative Underline -->
  <rect x="325" y="200" width="820" height="2" fill="url(#textGradient)" opacity="0.3" />
</svg>
