<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant Futuristic Gradients -->
    <linearGradient id="cyanToPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#BF00FF" />
    </linearGradient>

    <radialGradient id="centralGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#000428" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="coreGradient" x1="256" y1="180" x2="256" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#7A26C1" />
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Ambience -->
  <rect width="512" height="512" fill="transparent" />
  <circle cx="256" cy="256" r="220" fill="url(#centralGlow)" />

  <!-- The "Centravity" Orbitals - 3 Interlocking 'C' Segments -->
  <g filter="url(#softGlow)">
    <!-- Segment 1 -->
    <path d="M256 80 C352.8 80 432 159.2 432 256 C432 290 422 322 405 348" 
          stroke="url(#cyanToPurple)" stroke-width="32" stroke-linecap="round" />
    
    <!-- Segment 2 -->
    <path d="M370 410 C338 430 300 442 256 442 C159.2 442 80 362.8 80 256 C80 230 85 205 96 182" 
          stroke="url(#cyanToPurple)" stroke-width="32" stroke-linecap="round" />

    <!-- Segment 3 -->
    <path d="M142 102 C174 88 214 80 256 80" 
          stroke="url(#cyanToPurple)" stroke-width="32" stroke-linecap="round" />
  </g>

  <!-- Central Hexagonal AI Core -->
  <path d="M256 180 L322 218 V294 L256 332 L190 294 V218 Z" fill="url(#coreGradient)" filter="url(#softGlow)">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="30s" repeatCount="indefinite" />
  </path>

  <!-- Connective Nodes -->
  <circle cx="256" cy="80" r="10" fill="white" filter="url(#softGlow)" />
  <circle cx="405" cy="348" r="10" fill="white" filter="url(#softGlow)" />
  <circle cx="96" cy="182" r="10" fill="white" filter="url(#softGlow)" />

  <!-- Subtle Inner Connectivity Lines -->
  <line x1="256" y1="180" x2="256" y2="80" stroke="#00F5FF" stroke-width="2" stroke-dasharray="4 4" opacity="0.6" />
  <line x1="322" y1="294" x2="405" y2="348" stroke="#BF00FF" stroke-width="2" stroke-dasharray="4 4" opacity="0.6" />
  <line x1="190" y1="218" x2="96" y2="182" stroke="#00F5FF" stroke-width="2" stroke-dasharray="4 4" opacity="0.6" />

</svg>

